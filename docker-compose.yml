# EarthRise — Local Development Stack
#
# Starts MSSQL (Linux container) and initializes the database schema.
# The game server runs natively on the host and connects to localhost:1433.
#
# Usage:
#   docker compose up -d          # Start MSSQL
#   docker compose logs db-init   # Verify schema applied
#   .\x64\Release\EarthRiseServer.exe   # Run server natively
#
# Override the SA password via .env file or environment variable:
#   SA_PASSWORD=YourStr0ngPassword docker compose up -d

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD:-Earthr1se!Dev}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -Q "SELECT 1" -C -No
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - earthrise-net

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./deploy/sql:/sql:ro
    entrypoint: /opt/mssql-tools18/bin/sqlcmd
    command: >
      -S db -U sa -P "${SA_PASSWORD:-Earthr1se!Dev}"
      -i /sql/schema.sql
      -C -No
    networks:
      - earthrise-net

volumes:
  mssql-data:

networks:
  earthrise-net:
